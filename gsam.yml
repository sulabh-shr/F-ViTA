name: gsam
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python>=3.10,<3.12
  - pytorch>=2.1
  - torchvision
  - torchaudio
  - pytorch-cuda=12.4
  - pip
  - pip:
      # Core diffusion / ML stack
      - diffusers>=0.25,<0.32
      - transformers>=4.38,<4.46
      - accelerate>=0.20
      - safetensors

      # Image processing
      - opencv-python>=4.5
      - Pillow
      - numpy>=1.24
      - scikit-image>=0.20

      # GSAM conditioning
      - positional-encodings>=6.0

      # Evaluation metrics
      - lpips
      - clean-fid
      - pycocoevalcap
      - pycocotools

      # Datasets and utilities
      - datasets
      - huggingface-hub
      - matplotlib
      - tqdm
      - pyyaml
      - scipy

      # Recognize Anything Model (RAM)
      - ram @ git+https://github.com/xinyu1205/recognize-anything.git
      - fairscale

      # Needed internally by RAM / Grounded-DINO backbones
      - timm>=0.9,<1
      - addict
      - yapf

      # Code formatting
      - isort
      - black

      # Optional: 8-bit optimizer (uncomment if using --use_8bit_adam)
      - bitsandbytes

      # Optional: training logging (uncomment as needed)
      - wandb
      - tensorboard
